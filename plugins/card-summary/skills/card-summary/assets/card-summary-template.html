<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カードサマリ</title>
<style>
:root{--ink:#242733;--muted:#717584;--line:#eadfd5}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(150deg,#fff9f0,#fff3f7 45%,#eef5ff);font-family:"Segoe UI","Noto Sans JP",sans-serif}button{font:inherit;cursor:pointer}.page{width:min(100%,820px);margin:0 auto;padding:24px 16px 34px}.hero{text-align:center;margin-bottom:20px}.label{display:inline-block;padding:6px 18px;margin-bottom:12px;border-radius:14px;background:#fff;border:2px solid #eadfd5;font-size:12px;font-weight:850;letter-spacing:.14em}h1{margin:0 0 8px;font-size:clamp(1.55rem,6vw,2.35rem);line-height:1.28}.lead{max-width:650px;margin:0 auto;color:var(--muted);font-size:.9rem;line-height:1.75}.tabs,.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:18px 0}.tabs button,.filters button{min-height:36px;padding:0 13px;color:#555768;background:#fff;border:1px solid var(--line);border-radius:999px;font-size:.78rem;font-weight:850}.tabs button.is-active,.filters button.is-active{color:#fff;background:#2d2d3a;border-color:#2d2d3a}.note,.footer{margin:16px 0;padding:15px 16px;background:rgb(255 255 255 / 86%);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 14px rgb(75 54 37 / 6%)}.note p,.footer p{margin:0;color:#555965;font-size:.86rem;line-height:1.75}.cards{display:grid;gap:14px}.card{width:100%;padding:0;text-align:left;color:inherit;background:#fff;border:2px solid transparent;border-radius:20px;box-shadow:0 3px 12px rgb(60 46 35 / 6%);overflow:hidden}.card.is-open{box-shadow:var(--open-shadow);border-color:var(--soft-color)}.card-head{display:grid;grid-template-columns:54px 1fr 28px;gap:12px;align-items:center;padding:16px 18px}.mark{width:52px;height:52px;display:grid;place-items:center;border-radius:14px;color:var(--color);background:var(--pale-color);font-weight:950}.tag{display:inline-block;padding:3px 8px;margin-bottom:4px;color:#fff;background:var(--color);border-radius:7px;font-size:.68rem;font-weight:900}.count{margin-left:8px;color:#a4a6b2;font-size:.74rem;font-weight:750}.card h2{margin:0;font-size:1rem;line-height:1.43}.arrow{color:#b8bbc6;text-align:center}.card.is-open .arrow{transform:rotate(180deg)}.card-body{display:none;padding:0 18px 18px 84px}.card.is-open .card-body{display:block}.summary{margin:0 0 14px;color:var(--muted);font-size:.84rem;line-height:1.72}.visual{display:grid;grid-template-columns:52px 1fr;gap:12px;align-items:center;margin:0 0 14px;padding:12px;background:var(--pale-color);border:1px solid var(--soft-color);border-radius:14px}.symbol{width:48px;height:48px;display:grid;place-items:center;color:var(--color);background:#fff;border:2px solid var(--soft-color);border-radius:14px;font-size:1.3rem;font-weight:950}.flow{display:flex;flex-wrap:wrap;align-items:center;gap:6px}.chip{padding:5px 8px;background:#fff;border:1px solid var(--soft-color);border-radius:999px;font-size:.72rem;font-weight:850}.flow-arrow{color:var(--color);font-weight:950}.caption{margin-top:6px;color:#666a76;font-size:.74rem;font-weight:700;line-height:1.55}.points{display:grid;gap:9px}.point{display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:start}.num{width:24px;height:24px;display:grid;place-items:center;color:var(--color);background:var(--pale-color);border-radius:50%;font-size:.72rem;font-weight:950}.point p{margin:0;color:#444553;font-size:.88rem;line-height:1.66;font-weight:600}.tip{margin-top:15px;padding:12px 14px;background:var(--tip-color);border-left:4px solid var(--color);border-radius:13px}.tip strong{display:block;margin-bottom:4px;color:var(--color);font-size:.78rem}.tip p{margin:0;color:#555765;font-size:.82rem;line-height:1.7}@media(max-width:540px){.card-head{grid-template-columns:48px 1fr 24px;padding:14px}.card-body{padding:0 14px 16px}.visual{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="page">
<header class="hero"><div class="label" id="label"></div><h1 id="title"></h1><p class="lead" id="lead"></p></header>
<nav class="tabs" id="tabs"></nav>
<section class="note"><p id="note"></p></section>
<nav class="filters" id="filters"></nav>
<section class="cards" id="cards"></section>
<footer class="footer"><p>読み方の軸:<br><strong id="footer"></strong></p></footer>
</main>
<script>
const docs={sample:{label:"CARD SUMMARY",title:"カードサマリ",lead:"ここにリード文",note:"ここに資料の位置づけ",footer:"ここに読む軸",filters:[["all","すべて"],["core","中核"]],cards:[{id:1,mark:"01",tag:"中核",group:"core",tagColor:"#FF6B6B",title:"カードタイトル",summary:"一文要約",visual:{symbol:"→",flow:["入口","中間","出口"],caption:"ミニ図解の説明"},points:["要点1","要点2","要点3"],tip:"扱い方"}]}};
let activeDoc=Object.keys(docs)[0],activeFilter="all",openId=1;const $=id=>document.getElementById(id);function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}function doc(){return docs[activeDoc]}function visible(){return activeFilter==="all"?doc().cards:doc().cards.filter(c=>c.group===activeFilter)}function render(){const d=doc();$("label").textContent=d.label;$("title").textContent=d.title;$("lead").textContent=d.lead;$("note").textContent=d.note;$("footer").textContent=d.footer;$("tabs").innerHTML=Object.entries(docs).length>1?Object.entries(docs).map(([id,x])=>`<button class="${id===activeDoc?'is-active':''}" data-doc="${id}">${esc(x.label)}</button>`).join(""):"";$("filters").innerHTML=d.filters.map(([id,x])=>`<button class="${id===activeFilter?'is-active':''}" data-filter="${id}">${esc(x)}</button>`).join("");$("cards").innerHTML=visible().map(c=>cardHtml(c,d.cards.length)).join("");document.querySelectorAll('[data-doc]').forEach(b=>b.onclick=()=>{activeDoc=b.dataset.doc;activeFilter="all";openId=doc().cards[0]?.id;render()});document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{activeFilter=b.dataset.filter;openId=visible()[0]?.id;render()});document.querySelectorAll('.card').forEach(b=>b.onclick=()=>{const id=Number(b.dataset.id);openId=openId===id?null:id;render()})}function visualHtml(v){if(!v)return"";return`<div class="visual"><div class="symbol">${esc(v.symbol)}</div><div><div class="flow">${v.flow.map((x,i)=>`${i?'<span class="flow-arrow">→</span>':''}<span class="chip">${esc(x)}</span>`).join("")}</div><div class="caption">${esc(v.caption)}</div></div></div>`}function cardHtml(c,total){const open=openId===c.id,pale=`${c.tagColor}18`,soft=`${c.tagColor}44`,tip=`${c.tagColor}12`,shadow=`0 10px 34px ${c.tagColor}26,0 3px 10px rgb(0 0 0 / 5%)`;return`<button class="card ${open?'is-open':''}" data-id="${c.id}" style="--color:${c.tagColor};--pale-color:${pale};--soft-color:${soft};--tip-color:${tip};--open-shadow:${shadow}"><div class="card-head"><div class="mark">${esc(c.mark)}</div><div><span class="tag">${esc(c.tag)}</span><span class="count">${c.id}/${total}</span><h2>${esc(c.title)}</h2></div><div class="arrow">▼</div></div><div class="card-body"><p class="summary">${esc(c.summary)}</p>${visualHtml(c.visual)}<div class="points">${c.points.map((p,i)=>`<div class="point"><div class="num">${i+1}</div><p>${esc(p)}</p></div>`).join("")}</div><div class="tip"><strong>扱い方</strong><p>${esc(c.tip)}</p></div></div></button>`}render();
</script>
</body>
</html>
