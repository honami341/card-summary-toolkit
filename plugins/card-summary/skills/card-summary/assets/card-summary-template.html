<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Summary Template</title>
    <style>
      :root {
        --bg: #fff8f0;
        --bg-2: #f2f6ff;
        --panel: #ffffff;
        --ink: #2d2d3a;
        --muted: #747887;
        --line: #eadfd5;
        --shadow: 0 3px 12px rgb(60 46 35 / 6%);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: linear-gradient(150deg, var(--bg), #fff3f7 45%, var(--bg-2));
        font-family: "Segoe UI", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button { font: inherit; }

      .page {
        width: min(100%, 820px);
        margin: 0 auto;
        padding: 24px 16px 34px;
      }

      .hero {
        text-align: center;
        margin-bottom: 20px;
      }

      .label {
        display: inline-block;
        padding: 6px 18px;
        margin-bottom: 12px;
        color: #555768;
        background: #fff;
        border: 2px solid var(--line);
        border-radius: 14px;
        font-size: 12px;
        font-weight: 850;
        letter-spacing: .14em;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.55rem, 6vw, 2.35rem);
        line-height: 1.28;
        letter-spacing: 0;
      }

      .lead {
        max-width: 650px;
        margin: 0 auto;
        color: var(--muted);
        font-size: .9rem;
        line-height: 1.75;
      }

      .note,
      .footer {
        margin: 16px 0;
        padding: 15px 16px;
        background: rgb(255 255 255 / 86%);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 4px 14px rgb(75 54 37 / 6%);
      }

      .note p,
      .footer p {
        margin: 0;
        color: #555965;
        font-size: .86rem;
        line-height: 1.75;
      }

      .filters {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin: 18px 0;
      }

      .filters button {
        min-height: 36px;
        padding: 0 13px;
        color: #555768;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: .78rem;
        font-weight: 850;
        cursor: pointer;
      }

      .filters button[aria-pressed="true"] {
        color: #fff;
        background: #2d2d3a;
        border-color: #2d2d3a;
      }

      .filters button:focus-visible,
      summary:focus-visible {
        outline: 3px solid rgb(47 111 104 / 35%);
        outline-offset: 3px;
      }

      .cards {
        display: grid;
        gap: 14px;
      }

      .card {
        color: inherit;
        background: var(--panel);
        border: 2px solid transparent;
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: clip;
      }

      .card[open] {
        border-color: var(--soft-color);
        box-shadow: var(--open-shadow);
      }

      .card[hidden] { display: none; }

      summary {
        display: grid;
        grid-template-columns: 54px 1fr 28px;
        gap: 12px;
        align-items: center;
        padding: 16px 18px;
        list-style: none;
        cursor: pointer;
      }

      summary::-webkit-details-marker { display: none; }

      .mark {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        color: var(--color);
        background: var(--pale-color);
        border-radius: 14px;
        font-weight: 950;
      }

      .tag {
        display: inline-block;
        padding: 3px 8px;
        margin-bottom: 4px;
        color: #fff;
        background: var(--color);
        border-radius: 7px;
        font-size: .68rem;
        font-weight: 900;
      }

      .count {
        margin-left: 8px;
        color: #a4a6b2;
        font-size: .74rem;
        font-weight: 750;
      }

      .title {
        display: block;
        font-size: 1rem;
        line-height: 1.43;
        font-weight: 900;
      }

      .arrow {
        color: #b8bbc6;
        text-align: center;
        transition: transform .18s ease;
      }

      .card[open] .arrow { transform: rotate(180deg); }

      .card-body {
        padding: 0 18px 18px 84px;
      }

      .summary-text {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: .84rem;
        line-height: 1.72;
      }

      .visual {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 12px;
        align-items: center;
        margin: 0 0 14px;
        padding: 12px;
        background: var(--pale-color);
        border: 1px solid var(--soft-color);
        border-radius: 14px;
      }

      .symbol {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        color: var(--color);
        background: #fff;
        border: 2px solid var(--soft-color);
        border-radius: 14px;
        font-size: 1.3rem;
        font-weight: 950;
      }

      .flow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }

      .chip {
        padding: 5px 8px;
        background: #fff;
        border: 1px solid var(--soft-color);
        border-radius: 999px;
        font-size: .72rem;
        font-weight: 850;
      }

      .flow-arrow {
        color: var(--color);
        font-weight: 950;
      }

      .caption {
        margin-top: 6px;
        color: #666a76;
        font-size: .74rem;
        font-weight: 700;
        line-height: 1.55;
      }

      .points {
        display: grid;
        gap: 9px;
      }

      .point {
        display: grid;
        grid-template-columns: 24px 1fr;
        gap: 10px;
        align-items: start;
      }

      .num {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: var(--color);
        background: var(--pale-color);
        border-radius: 50%;
        font-size: .72rem;
        font-weight: 950;
      }

      .point p {
        margin: 0;
        color: #444553;
        font-size: .88rem;
        line-height: 1.66;
        font-weight: 600;
      }

      .tip {
        margin-top: 15px;
        padding: 12px 14px;
        background: var(--tip-color);
        border-left: 4px solid var(--color);
        border-radius: 13px;
      }

      .tip strong {
        display: block;
        margin-bottom: 4px;
        color: var(--color);
        font-size: .78rem;
      }

      .tip p {
        margin: 0;
        color: #555765;
        font-size: .82rem;
        line-height: 1.7;
      }

      @media (max-width: 540px) {
        .page { padding: 20px 12px 28px; }
        summary { grid-template-columns: 48px 1fr 24px; padding: 14px; }
        .mark { width: 46px; height: 46px; }
        .card-body { padding: 0 14px 16px; }
        .visual { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="label" id="label"></div>
        <h1 id="title"></h1>
        <p class="lead" id="lead"></p>
      </header>

      <section class="note"><p id="note"></p></section>
      <nav class="filters" id="filters" aria-label="Filter cards"></nav>
      <section class="cards" id="cards" aria-label="Card summary list"></section>
      <footer class="footer"><p>読み方の軸:<br><strong id="footer"></strong></p></footer>
    </main>

    <script>
      const cardData = [
        {
          id: 1,
          mark: "01",
          tag: "中核",
          group: "core",
          tagColor: "#FF6B6B",
          title: "カードタイトル",
          summary: "一文要約をここに置きます。",
          visual: {
            symbol: "→",
            flow: ["入口", "中間", "出口"],
            caption: "ミニ図解の説明をここに置きます。"
          },
          points: ["要点1", "要点2", "要点3"],
          tip: "扱い方やワンポイントをここに置きます。"
        }
      ];

      const pageMeta = {
        label: "CARD SUMMARY",
        title: "カードサマリ",
        lead: "ここにリード文を置きます。",
        note: "ここに資料の位置づけを置きます。",
        footer: "ここに読む軸を置きます。",
        filters: [["all", "すべて"], ["core", "中核"]]
      };

      const sixDigitHex = /^#[0-9a-fA-F]{6}$/;
      const fallbackColor = "#4f46e5";
      const cardsRoot = document.getElementById("cards");
      const filtersRoot = document.getElementById("filters");

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function colorOf(card) {
        return sixDigitHex.test(card.tagColor) ? card.tagColor : fallbackColor;
      }

      function alpha(hex, value) {
        return `${hex}${value}`;
      }

      function renderVisual(visual) {
        if (!visual) return "";
        const flow = (visual.flow || []).map((label, index) => `
          ${index > 0 ? '<span class="flow-arrow">→</span>' : ""}
          <span class="chip">${esc(label)}</span>
        `).join("");
        return `
          <div class="visual">
            <div class="symbol">${esc(visual.symbol || "→")}</div>
            <div>
              <div class="flow">${flow}</div>
              <div class="caption">${esc(visual.caption || "")}</div>
            </div>
          </div>
        `;
      }

      function renderCards() {
        cardsRoot.innerHTML = cardData.map((card, index) => {
          const color = colorOf(card);
          const style = `--color:${color};--pale-color:${alpha(color, "18")};--soft-color:${alpha(color, "44")};--tip-color:${alpha(color, "12")};--open-shadow:0 10px 34px ${alpha(color, "26")},0 3px 10px rgb(0 0 0 / 5%);`;
          return `
            <details class="card" data-group="${esc(card.group)}" style="${style}" ${index === 0 ? "open" : ""}>
              <summary>
                <span class="mark">${esc(card.mark)}</span>
                <span>
                  <span class="tag">${esc(card.tag)}</span>
                  <span class="count">${index + 1}/${cardData.length}</span>
                  <span class="title">${esc(card.title)}</span>
                </span>
                <span class="arrow" aria-hidden="true">▼</span>
              </summary>
              <div class="card-body">
                <p class="summary-text">${esc(card.summary)}</p>
                ${renderVisual(card.visual)}
                <div class="points">
                  ${(card.points || []).map((point, pointIndex) => `
                    <div class="point">
                      <div class="num">${pointIndex + 1}</div>
                      <p>${esc(point)}</p>
                    </div>
                  `).join("")}
                </div>
                <div class="tip">
                  <strong>扱い方</strong>
                  <p>${esc(card.tip)}</p>
                </div>
              </div>
            </details>
          `;
        }).join("");
      }

      function renderFilters() {
        filtersRoot.innerHTML = pageMeta.filters.map(([id, label]) => `
          <button type="button" data-filter="${esc(id)}" aria-pressed="${id === "all" ? "true" : "false"}">${esc(label)}</button>
        `).join("");
      }

      function applyFilter(filter) {
        document.querySelectorAll("#filters button").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.filter === filter));
        });
        document.querySelectorAll(".card").forEach((card) => {
          card.hidden = filter !== "all" && card.dataset.group !== filter;
        });
      }

      function init() {
        document.getElementById("label").textContent = pageMeta.label;
        document.getElementById("title").textContent = pageMeta.title;
        document.getElementById("lead").textContent = pageMeta.lead;
        document.getElementById("note").textContent = pageMeta.note;
        document.getElementById("footer").textContent = pageMeta.footer;
        renderFilters();
        renderCards();
        filtersRoot.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-filter]");
          if (!button) return;
          applyFilter(button.dataset.filter);
        });
      }

      init();
    </script>
  </body>
</html>
